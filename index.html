<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Linux</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root{
    --bg: #f5f5f7;
    --bg-elevated: #ffffff;
    --text: #1d1d1f;
    --text-dim: #6e6e73;
    --text-dimmer: #a1a1a6;
    --card-bg: rgba(255,255,255,0.72);
    --card-border: rgba(0,0,0,0.06);
    --accent: #0071e3;
    --accent-soft: rgba(0,113,227,0.08);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "Segoe UI", sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    position:relative;
  }

  #content{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 48px 24px 32px;
    filter: blur(22px);
  }

  #content.verified{
    animation: introBlur 1s cubic-bezier(.22,.61,.36,1) forwards;
  }

  @keyframes introBlur{
    from{ filter: blur(22px); }
    to{ filter: blur(0px); }
  }

  #gate{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(245,245,247,0.92);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    transition: opacity 0.5s ease;
  }

  #gate.gate-hidden{
    opacity:0;
    pointer-events:none;
  }

  .gate-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px -24px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.03);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    max-width: 320px;
    width:90%;
    text-align:center;
  }

  .gate-title{
    font-size:17px;
    font-weight:600;
    color:var(--text);
    letter-spacing:-0.01em;
  }

  .gate-subtitle{
    font-size:13px;
    color:var(--text-dim);
    line-height:1.6;
    margin-top:-8px;
  }

  .ambient{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    background:
      radial-gradient(ellipse 900px 600px at 50% 6%, rgba(0,0,0,0.035), transparent 60%),
      radial-gradient(ellipse 800px 600px at 90% 95%, rgba(0,0,0,0.02), transparent 60%),
      linear-gradient(180deg, #fbfbfc, var(--bg) 60%);
  }

  #dots{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    display:block;
    width:100%;
    height:100%;
  }

  main{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width: 480px;
  }

  .cube-stage{
    width: 170px;
    height: 170px;
    perspective: 900px;
    margin-bottom: 8px;
    opacity:0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) 0.05s forwards;
  }

  .cube-float{
    width:100%;
    height:100%;
    animation: float 5s ease-in-out infinite;
  }

  .cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style: preserve-3d;
    transform: rotateX(-22deg) rotateY(-35deg);
    will-change: transform;
  }

  .face{
    position:absolute;
    width:88px;
    height:88px;
    left:41px;
    top:41px;
    border:1px solid hsla(var(--hue), 55%, 45%, 0.35);
    background: linear-gradient(145deg, hsla(var(--hue),65%,60%,0.20), hsla(var(--hue),65%,55%,0.04));
    box-shadow: inset 0 0 30px hsla(var(--hue),60%,60%,0.10);
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .face.front{ transform: translateZ(44px); }
  .face.back{ transform: translateZ(-44px) rotateY(180deg); }
  .face.right{ transform: rotateY(90deg) translateZ(44px); }
  .face.left{ transform: rotateY(-90deg) translateZ(44px); }
  .face.top{ transform: rotateX(90deg) translateZ(44px); background: linear-gradient(145deg, hsla(var(--hue),65%,68%,0.32), hsla(var(--hue),65%,60%,0.10)); }
  .face.bottom{ transform: rotateX(-90deg) translateZ(44px); }

  .cube-glow{
    position:absolute;
    inset:0;
    border-radius:50%;
    filter: blur(38px);
    background: radial-gradient(circle, hsla(var(--hue), 65%, 60%, 0.32), transparent 70%);
    z-index:-1;
    transition: background 0.4s ease;
  }

  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.24em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.2s forwards;
  }

  h1{
    font-size: clamp(30px, 7vw, 42px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height:1.15;
    text-align:center;
    color: var(--text);
    margin-bottom: 14px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.3s forwards;
  }

  .subtitle{
    font-size: 15px;
    color: var(--text-dim);
    text-align:center;
    line-height:1.6;
    margin-bottom: 44px;
    max-width: 340px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.4s forwards;
  }

  .card{
    width:100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 6px;
    box-shadow: 0 20px 60px -24px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.03);
    opacity:0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) 0.5s forwards;
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:0; left:10%; right:10%;
    height:1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.08), transparent);
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 18px;
  }

  .divider{
    height:1px;
    background: var(--card-border);
    margin: 0 18px;
  }

  .field-label{
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .field-value{
    font-family: var(--mono);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .copy-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: rgba(0,0,0,0.015);
    color: var(--text-dim);
    cursor:pointer;
    flex-shrink:0;
    transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
  }
  .copy-btn:hover{
    background: var(--accent-soft);
    border-color: rgba(0,113,227,0.3);
    color: var(--accent);
  }
  .copy-btn:active{ transform: scale(0.92); }
  .copy-btn.done{
    background: var(--accent-soft);
    border-color: rgba(0,113,227,0.4);
    color: var(--accent);
  }

  .icon{ width:16px; height:16px; position:relative; }
  .icon svg{
    position:absolute; inset:0;
    width:16px; height:16px;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .icon .check{ opacity:0; transform: scale(0.6); }
  .copy-btn.done .icon .copy{ opacity:0; transform: scale(0.6); }
  .copy-btn.done .icon .check{ opacity:1; transform: scale(1); }

  footer{
    margin-top: 40px;
    font-size: 13px;
    color: var(--text-dimmer);
    text-align:center;
    letter-spacing:0.01em;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.65s forwards;
  }
  footer b{
    color: var(--text-dim);
    font-weight: 500;
  }
  footer .dot{
    display:inline-block;
    width:3px; height:3px;
    border-radius:50%;
    background: var(--text-dimmer);
    margin: 0 10px;
    vertical-align: middle;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes float{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(-8px); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    #content{ filter:none; }
    #gate{ transition:none; }
  }

  @media (max-width: 380px){
    .field-value{ font-size:17px; }
    .cube-stage{ width:140px; height:140px; }
  }
</style>
</head>
<body>

  <div id="gate">
    <div class="gate-card">
      <div class="gate-title">请完成验证以继续</div>
      <div class="gate-subtitle">确认您不是人机后即可访问网站🤣</div>
      <div class="cf-turnstile" data-sitekey="0x4AAAAAAD2Ncz8AOJMsCFrP" data-callback="onGatePassed"></div>
    </div>
  </div>

  <div id="content">
  <canvas id="dots"></canvas>
  <div class="ambient"></div>

  <main>
    <div class="cube-stage" style="--hue:210">
      <div class="cube-float">
        <div class="cube" id="cube">
          <div class="face front"></div>
          <div class="face back"></div>
          <div class="face right"></div>
          <div class="face left"></div>
          <div class="face top"></div>
          <div class="face bottom"></div>
        </div>
        <div class="cube-glow"></div>
      </div>
    </div>

    <div class="eyebrow">LINUX CLOUDFLARE-CDN GUANGZHOU-ROUTE · API</div>
    <h1>Minecraft Linux Pro</h1>
    <p class="subtitle">本服务器由Linux系统搭建部署 使用广州路线 Cloudflare全球CDN加速 纯终端运行</p>

    <div class="card">
      <div class="row">
        <div>
          <div class="field-label">服务器IP地址</div>
          <div class="field-value" id="ip-value">114.132.187.181</div>
        </div>
        <button class="copy-btn" data-copy="114.132.187.181" aria-label="复制服务器IP地址">
          <span class="icon">
            <svg class="copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div>
          <div class="field-label">端口码</div>
          <div class="field-value" id="port-value">19132</div>
        </div>
        <button class="copy-btn" data-copy="19132" aria-label="复制端口码">
          <span class="icon">
            <svg class="copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
        </button>
      </div>
    </div>

    <footer>
      搭建/维护 <b>贪睡</b><span class="dot"></span>管理员 <b>梁妹</b>
    </footer>
  </main>
  </div>

  <script>
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const text = btn.getAttribute('data-copy');
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        btn.classList.add('done');
        clearTimeout(btn._t);
        btn._t = setTimeout(() => btn.classList.remove('done'), 1600);
      });
    });

    const dotsCanvas = document.getElementById('dots');
    const dctx = dotsCanvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const SPACING = 36;
    const BASE_R = 1.6;
    const MAX_R = 5.5;
    const INFLUENCE = 170;

    let dots = [];
    let dotMouseX = -9999, dotMouseY = -9999;
    let dotPointerActive = false;

    const WAVE_DURATION = 1.0;
    const WAVE_SIGMA = 0.14;
    let waveActive = false;
    let waveStartTime = 0;

    function startWave(){
      waveStartTime = performance.now();
      waveActive = true;
    }

    function buildDots(){
      dots = [];
      const w = window.innerWidth;
      const h = window.innerHeight;
      const cols = Math.ceil(w / SPACING) + 1;
      const rows = Math.ceil(h / SPACING) + 1;
      const offsetX = (w - (cols - 1) * SPACING) / 2;
      const offsetY = (h - (rows - 1) * SPACING) / 2;
      for (let i = 0; i < cols; i++){
        for (let j = 0; j < rows; j++){
          dots.push({
            x: offsetX + i * SPACING,
            y: offsetY + j * SPACING,
            r: BASE_R
          });
        }
      }
    }

    function resizeDots(){
      const w = window.innerWidth;
      const h = window.innerHeight;
      dotsCanvas.width = w * DPR;
      dotsCanvas.height = h * DPR;
      dotsCanvas.style.width = w + 'px';
      dotsCanvas.style.height = h + 'px';
      dctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      buildDots();
    }

    window.addEventListener('resize', resizeDots);
    window.addEventListener('mousemove', e => {
      dotMouseX = e.clientX;
      dotMouseY = e.clientY;
      dotPointerActive = true;
    });
    window.addEventListener('mouseleave', () => { dotPointerActive = false; });
    document.addEventListener('mouseleave', () => { dotPointerActive = false; });
    window.addEventListener('blur', () => { dotPointerActive = false; });
    window.addEventListener('touchmove', e => {
      if (e.touches[0]){
        dotMouseX = e.touches[0].clientX;
        dotMouseY = e.touches[0].clientY;
        dotPointerActive = true;
      }
    }, { passive:true });
    window.addEventListener('touchend', () => { dotPointerActive = false; });

    function drawDots(){
      const w = window.innerWidth;
      const h = window.innerHeight;
      dctx.clearRect(0, 0, w, h);

      let waveElapsed = 0;
      if (waveActive){
        waveElapsed = (performance.now() - waveStartTime) / 1000;
        if (waveElapsed > WAVE_DURATION + WAVE_SIGMA * 4){
          waveActive = false;
        }
      }

      for (let k = 0; k < dots.length; k++){
        const d = dots[k];

        let hoverT = 0;
        if (dotPointerActive){
          const dx = d.x - dotMouseX;
          const dy = d.y - dotMouseY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < INFLUENCE){
            let t = 1 - dist / INFLUENCE;
            hoverT = t * t * (3 - 2 * t);
          }
        }

        let waveInfluence = 0;
        if (waveActive){
          const ratio = Math.min(1, Math.max(0, d.y / h));
          const timeHit = WAVE_DURATION * (1 - ratio);
          const dt = waveElapsed - timeHit;
          waveInfluence = Math.exp(-(dt * dt) / (2 * WAVE_SIGMA * WAVE_SIGMA));
        }

        const t = Math.max(hoverT, waveInfluence);
        const targetR = BASE_R + (MAX_R - BASE_R) * t;
        d.r += (targetR - d.r) * 0.22;
        d.t = (d.t === undefined ? 0 : d.t) + (t - (d.t === undefined ? 0 : d.t)) * 0.22;

        const alpha = 0.22 + 0.4 * d.t;
        if (d.r > 0.05){
          dctx.beginPath();
          dctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          dctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
          dctx.fill();
        }

        if (waveInfluence > 0.025){
          const hue = ((d.x / w) * 250 + (d.y / h) * 70 + waveElapsed * 130) % 360;
          const glowR = d.r * 2.4 + 1.5;
          const grad = dctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, glowR);
          grad.addColorStop(0, `hsla(${hue.toFixed(1)}, 58%, 70%, ${(waveInfluence * 0.55).toFixed(3)})`);
          grad.addColorStop(0.6, `hsla(${hue.toFixed(1)}, 58%, 68%, ${(waveInfluence * 0.28).toFixed(3)})`);
          grad.addColorStop(1, `hsla(${hue.toFixed(1)}, 58%, 68%, 0)`);
          dctx.beginPath();
          dctx.arc(d.x, d.y, glowR, 0, Math.PI * 2);
          dctx.fillStyle = grad;
          dctx.fill();
        }
      }
    }

    resizeDots();

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function onGatePassed(){
      document.getElementById('gate').classList.add('gate-hidden');
      document.getElementById('content').classList.add('verified');
      if (!prefersReduced){
        setTimeout(startWave, 1000);
      }
    }

    const cubeStage = document.querySelector('.cube-stage');
    const cube = document.getElementById('cube');

    let targetTiltX = -22, targetTiltY = 0;
    let curRX = -22, curRY = -35;
    let autoAngle = -35;
    let hue = 210, targetHue = 210;
    let hasPointer = false;

    function updateFromPoint(clientX, clientY){
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = Math.max(-1, Math.min(1, (clientX - cx) / cx));
      const dy = Math.max(-1, Math.min(1, (clientY - cy) / cy));
      targetTiltY = dx * 24;
      targetTiltX = -dy * 16;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      targetHue = (angle + 360) % 360;
      hasPointer = true;
    }

    window.addEventListener('mousemove', e => updateFromPoint(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => {
      if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    function loop(){
      drawDots();

      if (!prefersReduced){
        autoAngle += 0.1;
      }
      const ry = autoAngle - 35 + targetTiltY;
      const rx = -22 + targetTiltX;

      curRX += (rx - curRX) * 0.06;
      curRY += (ry - curRY) * 0.06;

      let diff = targetHue - hue;
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      hue = (hue + diff * 0.035 + 360) % 360;

      cube.style.transform = `rotateX(${curRX.toFixed(2)}deg) rotateY(${curRY.toFixed(2)}deg)`;
      cubeStage.style.setProperty('--hue', hue.toFixed(1));

      if (!prefersReduced) requestAnimationFrame(loop);
    }
    loop();
  </script>

</body>
</html>
