<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的世界服务器 · 基岩版</title>
<style>
  :root{
    --bg: #f5f5f7;
    --bg-elevated: #ffffff;
    --text: #1d1d1f;
    --text-dim: #6e6e73;
    --text-dimmer: #a1a1a6;
    --card-bg: rgba(255,255,255,0.72);
    --card-border: rgba(0,0,0,0.06);
    --accent: #0071e3;
    --accent-soft: rgba(0,113,227,0.08);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "Segoe UI", sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    padding: 48px 24px 32px;
  }

  /* ambient background */
  .ambient{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 900px 600px at 50% 6%, rgba(0,0,0,0.035), transparent 60%),
      radial-gradient(ellipse 800px 600px at 90% 95%, rgba(0,0,0,0.02), transparent 60%),
      linear-gradient(180deg, #fbfbfc, var(--bg) 60%);
  }

  #dots{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    display:block;
    width:100%;
    height:100%;
  }

  main{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width: 480px;
  }

  /* ---------- cube signature ---------- */
  .cube-stage{
    width: 170px;
    height: 170px;
    perspective: 900px;
    margin-bottom: 8px;
    opacity:0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) 0.05s forwards;
  }

  .cube-float{
    width:100%;
    height:100%;
    animation: float 5s ease-in-out infinite;
  }

  .cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style: preserve-3d;
    transform: rotateX(-22deg) rotateY(-35deg);
    will-change: transform;
  }

  .face{
    position:absolute;
    width:88px;
    height:88px;
    left:41px;
    top:41px;
    border:1px solid hsla(var(--hue), 55%, 45%, 0.35);
    background: linear-gradient(145deg, hsla(var(--hue),65%,60%,0.20), hsla(var(--hue),65%,55%,0.04));
    box-shadow: inset 0 0 30px hsla(var(--hue),60%,60%,0.10);
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .face.front{ transform: translateZ(44px); }
  .face.back{ transform: translateZ(-44px) rotateY(180deg); }
  .face.right{ transform: rotateY(90deg) translateZ(44px); }
  .face.left{ transform: rotateY(-90deg) translateZ(44px); }
  .face.top{ transform: rotateX(90deg) translateZ(44px); background: linear-gradient(145deg, hsla(var(--hue),65%,68%,0.32), hsla(var(--hue),65%,60%,0.10)); }
  .face.bottom{ transform: rotateX(-90deg) translateZ(44px); }

  .cube-glow{
    position:absolute;
    inset:0;
    border-radius:50%;
    filter: blur(38px);
    background: radial-gradient(circle, hsla(var(--hue), 65%, 60%, 0.32), transparent 70%);
    z-index:-1;
    transition: background 0.4s ease;
  }

  /* ---------- text ---------- */
  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.24em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.2s forwards;
  }

  h1{
    font-size: clamp(30px, 7vw, 42px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height:1.15;
    text-align:center;
    color: var(--text);
    margin-bottom: 14px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.3s forwards;
  }

  .subtitle{
    font-size: 15px;
    color: var(--text-dim);
    text-align:center;
    line-height:1.6;
    margin-bottom: 44px;
    max-width: 340px;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.4s forwards;
  }

  /* ---------- connect card ---------- */
  .card{
    width:100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 6px;
    box-shadow: 0 20px 60px -24px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.03);
    opacity:0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) 0.5s forwards;
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:0; left:10%; right:10%;
    height:1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.08), transparent);
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 18px;
  }

  .divider{
    height:1px;
    background: var(--card-border);
    margin: 0 18px;
  }

  .field-label{
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .field-value{
    font-family: var(--mono);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .copy-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: rgba(0,0,0,0.015);
    color: var(--text-dim);
    cursor:pointer;
    flex-shrink:0;
    transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
  }
  .copy-btn:hover{
    background: var(--accent-soft);
    border-color: rgba(0,113,227,0.3);
    color: var(--accent);
  }
  .copy-btn:active{ transform: scale(0.92); }
  .copy-btn.done{
    background: var(--accent-soft);
    border-color: rgba(0,113,227,0.4);
    color: var(--accent);
  }

  .icon{ width:16px; height:16px; position:relative; }
  .icon svg{
    position:absolute; inset:0;
    width:16px; height:16px;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .icon .check{ opacity:0; transform: scale(0.6); }
  .copy-btn.done .icon .copy{ opacity:0; transform: scale(0.6); }
  .copy-btn.done .icon .check{ opacity:1; transform: scale(1); }

  /* ---------- footer ---------- */
  footer{
    margin-top: 40px;
    font-size: 13px;
    color: var(--text-dimmer);
    text-align:center;
    letter-spacing:0.01em;
    opacity:0;
    animation: rise 0.8s cubic-bezier(.16,1,.3,1) 0.65s forwards;
  }
  footer b{
    color: var(--text-dim);
    font-weight: 500;
  }
  footer .dot{
    display:inline-block;
    width:3px; height:3px;
    border-radius:50%;
    background: var(--text-dimmer);
    margin: 0 10px;
    vertical-align: middle;
  }

  /* ---------- keyframes ---------- */
  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes float{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(-8px); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }

  @media (max-width: 380px){
    .field-value{ font-size:17px; }
    .cube-stage{ width:140px; height:140px; }
  }
</style>
</head>
<body>

  <div class="ambient"></div>

  <main>
    <div class="cube-stage" style="--hue:210">
      <div class="cube-float">
        <div class="cube" id="cube">
          <div class="face front"></div>
          <div class="face back"></div>
          <div class="face right"></div>
          <div class="face left"></div>
          <div class="face top"></div>
          <div class="face bottom"></div>
        </div>
        <div class="cube-glow"></div>
      </div>
    </div>

    <div class="eyebrow">基岩版 · Bedrock Edition</div>
    <h1>我的世界服务器</h1>
    <p class="subtitle">随时加入，随时建造。</p>

    <div class="card">
      <div class="row">
        <div>
          <div class="field-label">服务器地址</div>
          <div class="field-value" id="ip-value">114.132.187.181</div>
        </div>
        <button class="copy-btn" data-copy="114.132.187.181" aria-label="复制服务器地址">
          <span class="icon">
            <svg class="copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div>
          <div class="field-label">端口</div>
          <div class="field-value" id="port-value">19132</div>
        </div>
        <button class="copy-btn" data-copy="19132" aria-label="复制端口">
          <span class="icon">
            <svg class="copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
        </button>
      </div>
    </div>

    <footer>
      搭建维护 <b>贪睡</b><span class="dot"></span>管理员 <b>梁妹</b>
    </footer>
  </main>

  <script>
    // ---- 复制按钮 ----
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const text = btn.getAttribute('data-copy');
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        btn.classList.add('done');
        clearTimeout(btn._t);
        btn._t = setTimeout(() => btn.classList.remove('done'), 1600);
      });
    });

    // ---- 方块跟随鼠标方向旋转 + 变色 ----
    const cubeStage = document.querySelector('.cube-stage');
    const cube = document.getElementById('cube');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let targetTiltX = -22, targetTiltY = 0;
    let curRX = -22, curRY = -35;
    let autoAngle = -35;
    let hue = 210, targetHue = 210;
    let hasPointer = false;

    function updateFromPoint(clientX, clientY){
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = Math.max(-1, Math.min(1, (clientX - cx) / cx));
      const dy = Math.max(-1, Math.min(1, (clientY - cy) / cy));
      targetTiltY = dx * 24;
      targetTiltX = -dy * 16;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      targetHue = (angle + 360) % 360;
      hasPointer = true;
    }

    window.addEventListener('mousemove', e => updateFromPoint(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => {
      if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    function loop(){
      if (!reduceMotion){
        autoAngle += 0.1;
      }
      const ry = autoAngle - 35 + targetTiltY;
      const rx = -22 + targetTiltX;

      curRX += (rx - curRX) * 0.06;
      curRY += (ry - curRY) * 0.06;

      let diff = targetHue - hue;
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      hue = (hue + diff * 0.035 + 360) % 360;

      cube.style.transform = `rotateX(${curRX.toFixed(2)}deg) rotateY(${curRY.toFixed(2)}deg)`;
      cubeStage.style.setProperty('--hue', hue.toFixed(1));

      if (!reduceMotion) requestAnimationFrame(loop);
    }
    loop();
  </script>

</body>
</html>
